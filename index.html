<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>5/3/1 Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0D1117;color:#E6EDF3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%}
#root{max-width:480px;margin:0 auto;padding-bottom:calc(72px + env(safe-area-inset-bottom));min-height:100vh}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
textarea{background:#21262D;border:1px solid #30363D;border-radius:6px;color:#E6EDF3;font-size:11px;font-family:monospace;padding:8px;width:100%;outline:none;resize:vertical}
::-webkit-scrollbar{display:none}
.hdr{background:#161B22;border-bottom:2px solid #FCC100;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top));position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#161B22;border-top:1px solid #30363D;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:8px 1px;background:none;border:none;font-size:10px;cursor:pointer;font-family:inherit}
.wk{padding:5px 11px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-family:inherit}
.card{background:#161B22;border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1px solid #30363D}
.sr{display:flex;align-items:center;gap:8px;padding:8px 6px}
.ch{display:flex;font-size:10px;color:#484F58;margin-bottom:4px;gap:8px}
.inp{background:#21262D;border-radius:6px;padding:6px 8px;color:#E6EDF3;font-size:14px;width:54px;text-align:center;outline:none;font-family:inherit}
.btn{border:none;border-radius:8px;padding:10px 16px;font-weight:bold;font-size:13px;cursor:pointer;font-family:inherit}
.cb{background:none;border:none;color:#E6EDF3;width:100%;text-align:left;cursor:pointer;display:flex;justify-content:space-between;padding:0;font-family:inherit;align-items:center}
.wi{font-size:13px;padding:5px 0;border-bottom:1px solid #30363D;color:#8B949E}
.ar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #30363D}
.tag{border-radius:4px;padding:2px 7px;font-size:11px;font-weight:bold;flex-shrink:0;margin-left:8px}
.ph-btn{padding:8px 14px;border-radius:8px;border:2px solid transparent;font-size:12px;font-weight:bold;cursor:pointer;font-family:inherit}
.tm-inp{background:#21262D;border-radius:4px;padding:2px;color:#E6EDF3;font-size:10px;width:36px;text-align:center;outline:none;font-family:inherit}
.am-inp{background:#21262D;border-radius:3px;padding:2px;color:#F44336;font-size:10px;width:30px;text-align:center;outline:none;font-family:inherit}
</style>
</head>
<body>
<div id="root"><div style="color:#FCC100;padding:40px;text-align:center">Loading...</div></div>
<script>
var LIFTS={
  row:  {name:'Bent Over Row',          short:'Row',       type:'Upper',clr:'#1565C0',inc:5},
  ohp:  {name:'OHP (Axle)',              short:'OHP',       type:'Upper',clr:'#C62828',inc:5},
  pp:   {name:'Push Press (off blocks)', short:'Push Press',type:'Upper',clr:'#E65100',inc:5},
  squat:{name:'Squat (SSB to Low Bar)', short:'Squat',     type:'Lower',clr:'#2E7D32',inc:10},
  bench:{name:'Competition Bench',      short:'Bench',     type:'Upper',clr:'#C62828',inc:5},
  pd:   {name:'Pull Down',              short:'Pull Down', type:'Upper',clr:'#1565C0',inc:5},
  dl:   {name:'Deadlift',               short:'Deadlift',  type:'Lower',clr:'#2E7D32',inc:10}
};
var LIFT_IDS=['row','ohp','pp','squat','bench','pd','dl'];

var PRO_WK=[
  {pcts:[.65,.75,.85],fslPct:.65,label:'65/75/85%'},
  {pcts:[.70,.80,.90],fslPct:.70,label:'70/80/90%'},
  {pcts:[.75,.85,.95],fslPct:.75,label:'75/85/95%'},
  {pcts:[.65,.65,.65],fslPct:null,label:'Deload 65%'}
];
var AMRAP_WK=[
  {pcts:[.65,.75,.85],reps:['5','5','AMRAP'],label:'5/5/AMRAP 65/75/85%'},
  {pcts:[.70,.80,.90],reps:['3','3','AMRAP'],label:'3/3/AMRAP 70/80/90%'},
  {pcts:[.75,.85,.95],reps:['5','3','AMRAP'],label:'5/3/AMRAP 75/85/95%'},
  {pcts:[.65,.65,.65],reps:['5','5','5'],    label:'Deload 3x5 65%'}
];
var FSL_SETS={1:3,2:5};
var FSL_GUIDE={
  1:'Phase 1 (cut): 3 sets max. Deficit limits recovery — extra FSL volume costs more than it gives.',
  2:'Phase 2 (maintenance): all 5 sets available. Add set 4 when set 3 consistently feels like 70% effort with 3-4 reps in the tank. Add set 5 by the same standard.'
};

var PHASES=[
  {id:1,label:'Phase 1',full:'Phase 1 - CUT',clr:'#1565C0',
   desc:'Athletic/Power focus - 5s PRO FSL - Power first',
   wt:'220 to 180 lbs',criteria:'Hit 180 lbs on MacroFactor trend'},
  {id:2,label:'Phase 2',full:'Phase 2 - MAINTAIN',clr:'#2E7D32',
   desc:'Strength focus - Main lifts first - Low bar returns',
   wt:'Hold 180 lbs',criteria:'Low bar pattern solid - body settled at 180'},
  {id:3,label:'Phase 3+',full:'Phase 3 - BULK (coming)',clr:'#C62828',
   desc:'Push press - arm work - hypertrophy - coming at Phase 3',
   wt:'180 to 195 lbs',criteria:'Ready to bulk - push press technique established'}
];

var ACC={
  1:{
    d1:{pwrPos:'first',
      power:[{n:'Plyo Push-Up',s:'3x5',d:'Upper body push power - max intent each rep'}],
      acc:[{n:'Face Pull',s:'3x15',d:'Rear delt + posterior capsule - non-negotiable'}],
      fin:'Dead Bug - 3x8 each side',
      wu:['Cat-cow x10','Foam roller thoracic x10','Band pull-apart x15','Band ER x15ea','Dead hang 20-30s','Wall slides x10','Hip hinge practice x10 light KB'],
      cd:['Cross-body shoulder 45s ea','Lat stretch 45s ea',"Child's pose 60s",'Wrist stretch 30s ea']},
    d2:{pwrPos:'first',
      power:[{n:'Box Jump',s:'3x3',d:'Low box - step down, full reset each rep'}],
      acc:[{n:'Hip Thrust machine',s:'3x5 heavy',d:'Glute power - primary 1st step driver'},{n:'Nordic Curl',s:'3x5',d:'Eccentric only to start - hamstring resilience'}],
      fin:'McGill Side Plank - 30-45s each side',
      wu:['McGill bird dog x8ea','90/90 hip x5ea','Banded clamshell x15ea','Ankle dorsiflexion x10','Goblet squat x10 light'],
      cd:['Pigeon pose 60-90s ea','Couch stretch 60s ea','Supine knee-to-chest 45s ea','Hamstring stretch 45s','Cossack squat x8 BW']},
    d3:{pwrPos:'first',
      power:[{n:'Lateral Bound',s:'3x3ea',d:'1st step lateral power - full reset each rep'}],
      acc:[{n:'Cable Lateral Raise',s:'3x15-20',d:'Medial delt - scapular plane, stop at shoulder height'}],
      fin:'Lateral Bound - 3x3 each direction',
      wu:['Cat-cow x10','Band pull-apart x15','Band ER x15ea','Wall slides x10','Dead hang 20s','Wrist circles x10'],
      cd:['Pec stretch 45s ea','Cross-body shoulder 45s ea','Lat stretch 45s ea','Wrist stretch 30s ea']},
    d4:{pwrPos:'first',
      power:[{n:'Broad Jump',s:'3x3',d:'Horizontal power - most specific to 1st step, full reset'}],
      acc:[{n:'KB Swing',s:'3-5x10',d:'Posterior chain power'},{n:'Nordic Curl',s:'3x5',d:'Eccentric only - hamstring resilience'}],
      fin:'Sandbag To Shoulder (conditioning)',
      wu:['McGill Big 3 (curl-up + bird dog + side plank)','Cat-cow x10','Glute bridge x15','Clamshell x15ea','Light KB deadlift x10'],
      cd:['Pigeon pose 90s ea','Supine twist 60s ea','Couch stretch 60s ea','Seated forward fold 60s']}
  },
  2:{
    d1:{pwrPos:'last',
      power:[{n:'Plyo Push-Up',s:'2x5',d:'Maintenance - max intent'}],
      acc:[{n:'Face Pull',s:'3x15',d:'Rear delt - non-negotiable'},{n:'Hammer Curl',s:'2-3x10-15',d:'Double progression 10-15 reps - first direct arm work'}],
      fin:'Dead Bug - 3x8 each side',
      wu:['Cat-cow x10','Foam roller thoracic x10','Band pull-apart x15','Band ER x15ea','Dead hang 20-30s','Wall slides x10','Push press technique practice - bar only x10 (prep for Phase 3)'],
      cd:['Cross-body shoulder 45s ea','Lat stretch 45s ea',"Child's pose 60s",'Wrist stretch 30s ea']},
    d2:{pwrPos:'last',
      power:[{n:'Box Jump',s:'2x3',d:'Maintenance'}],
      acc:[{n:'Hip Thrust machine',s:'3x5 heavy',d:'Glute power'},{n:'Nordic Curl',s:'3x5',d:'Eccentric - sprint prep'}],
      fin:'McGill Side Plank - 30-45s each side',
      wu:['McGill bird dog x8ea','90/90 hip x5ea','Banded clamshell x15ea','Ankle dorsiflexion x10','Goblet squat x10 light'],
      cd:['Pigeon pose 60-90s ea','Couch stretch 60s ea','Supine knee-to-chest 45s ea','Hamstring stretch 45s']},
    d3:{pwrPos:'last',
      power:[{n:'Med Ball Rotational Slam',s:'2x5ea',d:'Maintenance - hips drive first'}],
      acc:[{n:'Hammer Curl',s:'2-3x10-15',d:'Double progression'},{n:'Cable Lateral Raise',s:'3x15-20',d:'Medial delt'}],
      fin:'Dead Bug - 3x8 each side',
      wu:['Cat-cow x10','Band pull-apart x15','Band ER x15ea','Wall slides x10','Dead hang 20s','Wrist circles x10'],
      cd:['Pec stretch 45s ea','Cross-body shoulder 45s ea','Lat stretch 45s ea','Wrist stretch 30s ea']},
    d4:{pwrPos:'none',
      power:[],
      acc:[{n:'KB Swing',s:'3-5x10',d:'Posterior chain power'},{n:'Nordic Curl',s:'3x5',d:'Eccentric - sprint prep'}],
      fin:'Sandbag To Shoulder (conditioning)',
      wu:['McGill Big 3','Cat-cow x10','Glute bridge x15','Clamshell x15ea','Light KB deadlift x10'],
      cd:['Pigeon pose 90s ea','Supine twist 60s ea','Couch stretch 60s ea','Seated forward fold 60s']}
  }
};

var ST={tab:'d1',phase:1,cycle:1,week:1,
  tms:{row:{},ohp:{},pp:{},squat:{},bench:{},pd:{},dl:{}},
  logs:{row:{},ohp:{},pp:{},squat:{},bench:{},pd:{},dl:{}},
  amraps:{ohp:{},pp:{},squat:{},bench:{},pd:{},dl:{}},
  ach_weeks:0,cur_weight:219
};
var KEY='531-v2';

function save(){try{localStorage.setItem(KEY,JSON.stringify(ST));}catch(e){}}
function load(){
  try{
    var s=localStorage.getItem(KEY);if(!s)return;
    var d=JSON.parse(s);
    ST.tab=d.tab||'d1';ST.phase=d.phase||1;ST.cycle=d.cycle||1;ST.week=d.week||1;
    ST.tms=d.tms||{row:{},ohp:{},pp:{},squat:{},bench:{},pd:{},dl:{}};
    ST.logs=d.logs||{row:{},ohp:{},pp:{},squat:{},bench:{},pd:{},dl:{}};
    ST.amraps=d.amraps||{ohp:{},pp:{},squat:{},bench:{},pd:{},dl:{}};
    ST.ach_weeks=d.ach_weeks||0;ST.cur_weight=d.cur_weight||219;
  }catch(e){}
}

function r5(n){return Math.round(n/5)*5;}
function cWt(tm,pct){return tm?r5(tm*pct):0;}
function brz(w,r){if(!w||!r||r<=0||r>=37)return 0;return Math.round(w*36/(37-r)*10)/10;}
function getTM(id){var t=ST.tms[id];return(t&&t[ST.cycle])?t[ST.cycle]:0;}
function lk(){return ST.cycle+'_'+ST.week;}
function gL(id,f){var k=lk();var l=ST.logs[id]&&ST.logs[id][k];if(!l)return'';return l[f]!==undefined?l[f]:'';}
function sprintOK(){return ST.ach_weeks>=12&&ST.cur_weight<200;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function inp(id,f,ph,clr,val){
  return '<input type="number" inputmode="decimal" class="inp" placeholder="'+ph+'" style="border:1px solid '+(clr||'#30363D')+';" value="'+esc(val||'')+'" oninput="iL(\''+id+'\',\''+f+'\',this.value)">';
}
function colH(){
  return '<div class="ch"><span style="flex:1">SET</span><span style="width:54px;text-align:center">TARGET</span><span style="width:54px;text-align:center">REPS</span><span style="width:54px;text-align:center">ACT WT</span><span style="width:54px;text-align:center">ACT REPS</span></div>';
}

function iL(id,f,val){
  var k=lk();
  if(!ST.logs[id])ST.logs[id]={};
  if(!ST.logs[id][k])ST.logs[id][k]={};
  ST.logs[id][k][f]=val;
  if(f==='amrap'&&val){if(!ST.amraps[id])ST.amraps[id]={};ST.amraps[id][k]=+val;}
  save();
  if(f==='amrap'){
    var el=document.getElementById('bo-'+id);if(el)el.textContent=+val>2?(+val-2)+' reps':'AMRAP-2';
    var e=document.getElementById('e1-'+id);
    if(e){var tm=getTM(id);var wk=AMRAP_WK[ST.week-1];var tw=cWt(tm,wk.pcts[2]);var est=brz(tw,+val);e.textContent=est?'approx '+est+' lbs est. 1RM':'';}
  }
  if(f==='db_wt'){var ks=document.getElementById('ks');if(ks&&val){var lo=r5(+val*1.10);var hi=r5(+val*1.15);ks.textContent='Suggested: '+lo+'-'+hi+' lbs';}}
}
function iTM(id,cy,val){if(!ST.tms[id])ST.tms[id]={};ST.tms[id][cy]=val?+val:0;save();}
function iNum(f,val){ST[f]=val?+val:0;save();var ss=document.getElementById('ss');if(ss)ss.innerHTML=sprintStatus();}
function setTab(t){ST.tab=t;save();render();}
function setWeek(w){ST.week=+w;save();render();}
function setPhase(p){ST.phase=+p;save();render();}
function tog(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function saveAmrap(id,k,val){if(!ST.amraps[id])ST.amraps[id]={};ST.amraps[id][k]=val?+val:0;save();}

function advCycle(){
  if(!confirm('Advance Cycle '+ST.cycle+' to '+(ST.cycle+1)+'? TMs +5 upper / +10 lower. Session logs cleared.'))return;
  var nc=ST.cycle+1;
  LIFT_IDS.forEach(function(id){var tm=getTM(id);if(tm){if(!ST.tms[id])ST.tms[id]={};ST.tms[id][nc]=tm+LIFTS[id].inc;}});
  LIFT_IDS.forEach(function(id){ST.logs[id]={};});
  ST.cycle=nc;ST.week=1;save();render();
}
function doExport(){
  document.getElementById('exp-box').style.display='block';
  document.getElementById('imp-box').style.display='none';
  document.getElementById('exp-data').value=JSON.stringify(ST,null,2);
}
function doCopy(){
  var el=document.getElementById('exp-data');el.select();
  try{document.execCommand('copy');alert('Copied!');}catch(e){alert('Select all text and copy manually');}
}
function doImport(){
  document.getElementById('imp-box').style.display='block';
  document.getElementById('exp-box').style.display='none';
}
function doLoad(){
  try{
    var d=JSON.parse(document.getElementById('imp-data').value);
    ST.tab=d.tab||'d1';ST.phase=d.phase||1;ST.cycle=d.cycle||1;ST.week=d.week||1;
    ST.tms=d.tms||{};ST.logs=d.logs||{};ST.amraps=d.amraps||{};
    ST.ach_weeks=d.ach_weeks||0;ST.cur_weight=d.cur_weight||219;
    save();render();
  }catch(e){alert('Import failed - check data and try again');}
}

function proSets(id,withFSL){
  var tm=getTM(id);var wk=PRO_WK[ST.week-1];var h='';
  var names=['Set 1','Set 2','Top Set'];
  for(var si=0;si<3;si++){
    var pct=wk.pcts[si];var tWt=cWt(tm,pct);var fld='s'+(si+1);
    h+='<div class="sr" style="border-bottom:1px solid #30363D">';
    h+='<div style="flex:1"><div style="font-size:13px">'+names[si]+'</div><div style="font-size:11px;color:#484F58">'+Math.round(pct*100)+'%</div></div>';
    h+='<span style="width:54px;text-align:center;font-size:17px;font-weight:bold;color:'+LIFTS[id].clr+'">'+(tWt||'-')+'</span>';
    h+='<span style="width:54px;text-align:center;font-size:12px;color:#8B949E">x5</span>';
    h+=inp(id,fld+'wt','lbs','',gL(id,fld+'wt'));
    h+=inp(id,fld+'reps','5','',gL(id,fld+'reps'));
    h+='</div>';
  }
  if(withFSL&&ST.week!==4&&wk.fslPct){
    var fslWt=cWt(tm,wk.fslPct);
    var maxSets=FSL_SETS[ST.phase]||3;
    h+='<div style="margin-top:8px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;background:#0D2818;border-radius:6px 6px 0 0">';
    h+='<div style="font-size:11px;color:#4CAF50;font-weight:bold">FSL - '+Math.round(wk.fslPct*100)+'% x 5</div>';
    h+='<div style="font-size:10px;color:#484F58">'+maxSets+' sets '+(ST.phase===1?'(Phase 1 cap)':'(Phase 2 - up to 5)')+'</div>';
    h+='</div>';
    for(var fi=1;fi<=5;fi++){
      var locked=fi>maxSets;
      var bg=locked?'#111':'#0D2818';
      var textClr=locked?'#30363D':'#4CAF50';
      h+='<div class="sr" style="background:'+bg+';'+(fi>1?'border-top:1px solid #0A1F0A;':'')+'">';
      h+='<div style="flex:1"><div style="font-size:13px;color:'+textClr+'">FSL '+fi;
      if(locked&&ST.phase===1)h+=' <span style="font-size:10px;color:#30363D">unlocks Phase 2</span>';
      else if(!locked&&fi>=4)h+=' <span style="font-size:10px;color:#484F58">add when set '+(fi-1)+' feels 70% effort</span>';
      h+='</div></div>';
      if(locked){
        h+='<span style="width:54px;text-align:center;color:#30363D">'+fslWt+'</span>';
        h+='<span style="width:54px;text-align:center;color:#30363D;font-size:11px">locked</span>';
        h+='<span style="width:54px"></span><span style="width:54px"></span>';
      }else{
        h+='<span style="width:54px;text-align:center;font-size:17px;font-weight:bold;color:#4CAF50">'+fslWt+'</span>';
        h+='<span style="width:54px;text-align:center;font-size:12px;color:#8B949E">x5</span>';
        h+=inp(id,'f'+fi+'wt','lbs','#4CAF50',gL(id,'f'+fi+'wt'));
        h+=inp(id,'f'+fi+'reps','reps','#4CAF50',gL(id,'f'+fi+'reps'));
      }
      h+='</div>';
    }
    h+='<div style="font-size:10px;color:#484F58;padding:4px 6px;font-style:italic">'+FSL_GUIDE[ST.phase]+'</div>';
    h+='</div>';
  }
  return h;
}

function amrapSets(id){
  var tm=getTM(id);var wk=AMRAP_WK[ST.week-1];var h='';
  var names=['Set 1','Set 2','AMRAP'];
  for(var si=0;si<3;si++){
    var pct=wk.pcts[si];var rep=wk.reps[si];
    var isA=rep==='AMRAP'&&ST.week!==4;
    var tWt=cWt(tm,pct);var fld='s'+(si+1);
    var bg=isA?'background:#3D1A1A;border-radius:6px;margin-bottom:3px;':'border-bottom:1px solid #30363D;';
    h+='<div class="sr" style="'+bg+'">';
    h+='<div style="flex:1"><div style="font-size:13px;font-weight:'+(isA?'bold':'normal')+';color:'+(isA?'#F44336':'#E6EDF3')+'">'+names[si]+'</div>';
    h+='<div style="font-size:11px;color:#484F58">'+Math.round(pct*100)+'%</div></div>';
    h+='<span style="width:54px;text-align:center;font-size:17px;font-weight:bold;color:'+(isA?'#F44336':LIFTS[id].clr)+'">'+(tWt||'-')+'</span>';
    h+='<span style="width:54px;text-align:center;font-size:12px;color:'+(isA?'#F44336':'#8B949E')+';font-weight:'+(isA?'bold':'normal')+'">'+rep+'</span>';
    h+=inp(id,fld+'wt','lbs',isA?'#F44336':'',gL(id,fld+'wt'));
    h+=inp(id,isA?'amrap':fld+'reps',isA?'reps':rep,isA?'#F44336':'',isA?gL(id,'amrap'):gL(id,fld+'reps'));
    h+='</div>';
  }
  if(ST.week!==4){
    var aR=+gL(id,'amrap')||0;var topWt=cWt(tm,wk.pcts[2]);var est=aR?brz(topWt,aR):0;
    h+='<div id="e1-'+id+'" style="font-size:12px;color:#FF9800;padding:4px 6px">'+(est?'approx '+est+' lbs est. 1RM':'')+'</div>';
    for(var bo=1;bo<=2;bo++){
      var bWt=cWt(tm,wk.pcts[2]);var aRv=+gL(id,'amrap')||0;var tR=aRv>2?(aRv-2)+' reps':'AMRAP-2';
      h+='<div class="sr" style="background:#1C2128;border-radius:6px;margin-bottom:3px">';
      h+='<div style="flex:1"><div style="font-size:13px;color:#64B5F6">Backoff '+bo+'</div>';
      h+='<div id="'+(bo===1?'bo-'+id:'')+'" style="font-size:11px;color:#484F58">Same wt - '+tR+'</div></div>';
      h+='<span style="width:54px;text-align:center;font-size:17px;font-weight:bold;color:#64B5F6">'+(bWt||'-')+'</span>';
      h+='<span style="width:54px;text-align:center;font-size:12px;color:#64B5F6">'+tR+'</span>';
      h+=inp(id,'bo'+bo+'wt','lbs','#64B5F6',gL(id,'bo'+bo+'wt'));

  }
  h+='</tr></thead><tbody>';
  LIFT_IDS.forEach(function(id){
    var l=LIFTS[id];
    h+='<tr><td style="padding:5px 4px;font-weight:bold;color:'+l.clr+';border-bottom:1px solid #30363D;white-space:nowrap;position:sticky;left:0;background:#161B22">'+l.short+'</td>';
    for(var cy=1;cy<=23;cy++){
      var val=(ST.tms[id]&&ST.tms[id][cy])||'';var isCur=ST.cycle===cy;
      h+='<td style="padding:2px;text-align:center;border-bottom:1px solid #30363D;background:'+(isCur?'#FCC10011':'transparent')+'">';
      h+='<input type="number" inputmode="decimal" class="tm-inp" style="border:1px solid '+(isCur?'#FCC100':'#30363D')+'" value="'+esc(val)+'" oninput="iTM(\''+id+'\','+cy+',this.value)">';
      h+='</td>';
    }
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  var amrapLifts=[
    {id:'pd',    label:'Pull Down / Wtd Pull-ups',clr:'#1565C0',
     note:'AMRAP all phases. Leave blank for deload weeks.'},
    {id:'ohp',   label:'OHP',clr:'#C62828',
     note:'Enter reps only when OHP runs as 5/3/1 AMRAP (Phase 2+). Leave blank during 5s PRO. Sets Push Press starting TM.'},
    {id:'pp',    label:'Push Press (off blocks)',clr:'#E65100',
     note:'Enter reps for cycles where Push Press is your main overhead lift. Leave blank until you switch from OHP.'},
    {id:'squat', label:'Squat (SSB to Low Bar)',clr:'#2E7D32',
     note:'Enter reps when squat runs 5/3/1 AMRAP (Phase 2+). Leave blank during 5s PRO FSL.'},
    {id:'bench', label:'Competition Bench',clr:'#C62828',
     note:'Enter reps when bench runs 5/3/1 AMRAP (Phase 3+). Leave blank during 5s PRO FSL.'},
    {id:'dl',    label:'Deadlift',clr:'#2E7D32',
     note:'Enter reps when deadlift runs 5/3/1 AMRAP (Phase 3+). Sumo backoffs every 3rd cycle from Phase 3.'},
  ];
  amrapLifts.forEach(function(al){
    h+=buildPRSection(al.id,al.label,al.clr,al.note);
  });
  return h;
}

function buildPRSection(id,label,clr,note){
  var h='<div class="card" style="border-left:3px solid '+clr+'">';
  h+='<div style="font-size:12px;font-weight:bold;color:'+clr+';margin-bottom:4px">'+label+'</div>';
  h+='<div style="font-size:10px;color:#E65100;margin-bottom:8px;font-style:italic">'+note+'</div>';
  h+='<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:10px;min-width:100%">';
  h+='<thead><tr style="color:#484F58">';
  ['Cy','TM','W1 R','W1 1RM','W2 R','W2 1RM','W3 R','W3 1RM','Best','PR'].forEach(function(h2){
    h+='<th style="padding:2px 3px;font-weight:normal;min-width:30px;text-align:center">'+h2+'</th>';
  });
  h+='</tr></thead><tbody>';
  var bestAll=[];
  var i;
  for(i=1;i<=23;i++){
    var tm=(ST.tms[id]&&ST.tms[id][i])||0;
    var maxE=0;
    var wi;
    for(wi=0;wi<3;wi++){
      var k=i+'_'+(wi+1);var aR=(ST.amraps[id]&&ST.amraps[id][k])||0;
      var w=tm?cWt(tm,[0.85,0.90,0.95][wi]):0;var e=aR&&w?brz(w,aR):0;
      if(e>maxE)maxE=e;
    }
    bestAll.push(maxE);
  }
  var allBest=0;
  for(i=0;i<bestAll.length;i++){if(bestAll[i]>allBest)allBest=bestAll[i];}
  for(i=1;i<=23;i++){
    var tm2=(ST.tms[id]&&ST.tms[id][i])||0;var isCur=ST.cycle===i;
    h+='<tr style="border-bottom:1px solid #30363D;background:'+(isCur?'#FCC10011':'transparent')+'">';
    h+='<td style="padding:3px;text-align:center;color:'+(isCur?'#FCC100':'#8B949E')+';font-weight:'+(isCur?'bold':'normal')+'">'+i+'</td>';
    h+='<td style="padding:3px;text-align:center;color:#8B949E">'+(tm2||'-')+'</td>';
    var rowBest=0;
    var pcts=[0.85,0.90,0.95];
    for(var wi2=0;wi2<3;wi2++){
      var k2=i+'_'+(wi2+1);var aR2=(ST.amraps[id]&&ST.amraps[id][k2])||0;
      var w2=tm2?cWt(tm2,pcts[wi2]):0;var e2=aR2&&w2?brz(w2,aR2):0;
      if(e2>rowBest)rowBest=e2;
      h+='<td style="padding:2px;text-align:center"><input type="number" inputmode="decimal" class="am-inp" value="'+(aR2||'')+'" oninput="saveAmrap(\''+id+'\',\''+k2+'\',this.value)"></td>';
      h+='<td style="padding:3px;text-align:center;color:#FF9800">'+(e2||'')+'</td>';
    }
    h+='<td style="padding:3px;text-align:center;font-weight:bold;color:'+(rowBest===allBest&&rowBest>0?'#FCC100':'#E6EDF3')+'">'+(rowBest||'-')+'</td>';
    h+='<td style="padding:3px;text-align:center">'+(rowBest===allBest&&rowBest>0?'PR':'')+'</td>';
    h+='</tr>';
  }
  h+='</tbody></table></div></div>';
  return h;
}

function render(){
  var ph=ST.phase;var phInfo=PHASES[Math.min(ph,3)-1]||PHASES[0];
  var content='';
  if(ST.tab==='overview')content=buildOverview();
  else if(ST.tab==='d1')content=buildDay(1);
  else if(ST.tab==='d2')content=buildDay(2);
  else if(ST.tab==='d3')content=buildDay(3);
  else if(ST.tab==='d4')content=buildDay(4);
  else if(ST.tab==='sprint')content=buildSprint();
  else if(ST.tab==='tracker')content=buildTracker();

  var hdr='<div class="hdr"><div>';
  hdr+='<div style="font-size:16px;font-weight:bold;color:#FCC100;letter-spacing:.5px">5/3/1</div>';
  hdr+='<div style="font-size:10px;color:#484F58">Cy '+ST.cycle+' - <span style="color:'+phInfo.clr+'">'+phInfo.full+'</span></div>';
  hdr+='</div><div style="display:flex;gap:5px">';
  for(var w=1;w<=4;w++){var a=ST.week===w;hdr+='<button class="wk" style="background:'+(a?'#FCC100':'#21262D')+';color:'+(a?'#0D1117':'#8B949E')+';font-weight:'+(a?'bold':'normal')+'" onclick="setWeek('+w+')">W'+w+'</button>';}
  hdr+='</div></div>';

  var tabs=[['overview','Overview'],['d1','Day 1'],['d2','Day 2'],['d3','Day 3'],['d4','Day 4'],['sprint','Sprint'],['tracker','Tracker']];
  var nav='<div class="nav">';
  tabs.forEach(function(t){var a=ST.tab===t[0];nav+='<button class="nb" style="color:'+(a?'#FCC100':'#484F58')+';font-weight:'+(a?'bold':'normal')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>';});
  nav+='</div>';

  document.getElementById('root').innerHTML=hdr+'<div style="padding:14px 14px 0">'+content+'</div>'+nav;
}

load();render();
</script>
</body>
</html>
